name: core_color
description: "FEBRIC Color engine: palettes, colorways, ICC/CMYK transforms, gamut and delta-E analysis. M13C ships the colour-transform seam and gamut-report vocabulary: reference-based, synchronous, deterministic contracts (the frozen RenderBackend placement doctrine — concurrency lives in isolates/backend orchestration, never in the seam); ICC science arrives behind the contract with the colour-science/backend slices. Zero colour science, zero pixel data, zero policy ships here."
version: 0.1.0
publish_to: none
resolution: workspace

environment:
  sdk: ^3.12.0

dependencies:
  core_common:
    path: ../core_common
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  meta: ^1.16.0

dev_dependencies:
  build_runner: ^2.15.0
  freezed: ^3.2.3
  json_serializable: ^6.11.1
  test: ^1.25.0

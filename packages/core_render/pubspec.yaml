name: core_render
description: "FEBRIC Rendering Constitution (M5B-1): pure-Dart frozen contracts — immutable models, frozen vocabularies, interfaces and the cache repository. No rendering, no GPU, no Flutter; the concrete driver lives in core_render_impeller (later)."
version: 0.1.0
publish_to: none
resolution: workspace

environment:
  sdk: ^3.12.0

dependencies:
  core_asset:
    path: ../core_asset
  core_canvas:
    path: ../core_canvas
  core_document:
    path: ../core_document
  core_geometry:
    path: ../core_geometry
  core_interaction:
    path: ../core_interaction
  core_layer:
    path: ../core_layer
  core_performance:
    path: ../core_performance
  core_textile:
    path: ../core_textile
  core_tooling:
    path: ../core_tooling
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  meta: ^1.16.0

dev_dependencies:
  build_runner: ^2.15.0
  freezed: ^3.2.3
  json_serializable: ^6.11.1
  test: ^1.25.0

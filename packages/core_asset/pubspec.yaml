dev_dependencies:
  build_runner: ^2.15.0
  core_document:
    path: ../core_document
  core_geometry:
    path: ../core_geometry
  core_layer:
    path: ../core_layer
  freezed: ^3.2.3
  json_serializable: ^6.11.1
  test: ^1.25.0

name: core_ai_staging
description: "FEBRIC AI Proposal Staging (M12A): the constitutional terminus of every AI path (invariant I2 — AI output becomes an AiProposal; only explicit user acceptance emits commands). Stages proposals, drives the frozen AiPipelineRun through documentUpdate/undoStack/review/approval via advanceTo, and on acceptance emits the proposal's frozen DocumentCommands through an injected DocumentCommandSink with CommandSource.ai and a mandatory AiProvenanceRecord (I5). Never mutates documents, never reduces commands, never owns a DocumentEngine. Pure composition of the frozen core_ai and core_document contracts."
version: 0.1.0
publish_to: none
resolution: workspace

environment:
  sdk: ^3.12.0

dependencies:
  core_ai:
    path: ../core_ai
  core_common:
    path: ../core_common
  core_document:
    path: ../core_document
  core_textile:
    path: ../core_textile
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  meta: ^1.16.0

dev_dependencies:
  build_runner: ^2.15.0
  core_geometry:
    path: ../core_geometry
  core_layer:
    path: ../core_layer
  freezed: ^3.2.3
  json_serializable: ^6.11.1
  test: ^1.25.0

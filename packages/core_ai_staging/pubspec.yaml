name: core_ai_staging
description: "FEBRIC AI Proposal Staging + Execution Orchestration (M12A/M12D): the execution-to-staging seam of the AI engine. Staging (M12A) is the constitutional terminus of every AI path (invariant I2 — AI output becomes an AiProposal; only explicit user acceptance emits commands): it drives the frozen AiPipelineRun through documentUpdate/undoStack/review/approval via advanceTo and on acceptance emits the proposal's frozen DocumentCommands through an injected DocumentCommandSink with CommandSource.ai and a mandatory AiProvenanceRecord (I5). The orchestrator (M12D) is the §19 'backend orchestrator' node: it walks the M12C ranked candidate list in order against injected frozen ProviderAdapters, transitions jobs exclusively via the frozen AiJob.withStatus, re-stamps the actual serving provider/model (I5), and hands the assembled proposal to staging — its terminal act. Never mutates documents, never reduces commands, never owns a DocumentEngine, ships no vendor code. Pure composition of the frozen core_ai and core_document contracts."
version: 0.1.0
publish_to: none
resolution: workspace

environment:
  sdk: ^3.12.0

dependencies:
  core_ai:
    path: ../core_ai
  core_common:
    path: ../core_common
  core_document:
    path: ../core_document
  core_lock:
    path: ../core_lock
  core_textile:
    path: ../core_textile
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  meta: ^1.16.0

dev_dependencies:
  build_runner: ^2.15.0
  core_geometry:
    path: ../core_geometry
  core_layer:
    path: ../core_layer
  freezed: ^3.2.3
  json_serializable: ^6.11.1
  test: ^1.25.0

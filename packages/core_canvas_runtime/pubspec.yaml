name: core_canvas_runtime
description: "FEBRIC Canvas Interaction Runtime (M6): the stateful controllers that implement the frozen CanvasRuntimeContract — viewport/zoom/pan/camera controllers, coordinate conversion, pointer routing, input dispatch, hit-test entry, cursor runtime and the interaction session. Composes the frozen core_interaction and core_canvas contracts; never redefines them."
version: 0.1.0
publish_to: none
resolution: workspace

environment:
  sdk: ^3.12.0

dependencies:
  core_canvas:
    path: ../core_canvas
  core_geometry:
    path: ../core_geometry
  core_interaction:
    path: ../core_interaction
  core_tooling:
    path: ../core_tooling
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  meta: ^1.16.0

dev_dependencies:
  build_runner: ^2.15.0
  freezed: ^3.2.3
  json_serializable: ^6.11.1
  test: ^1.25.0

name: core_canvas
description: "FEBRIC Canvas Runtime: the frozen visual-runtime constitution — session runtime, hit-testing to semantic nodes, overlay/ruler/print-region contracts. Composes the frozen viewport/camera/coordinate/transform/snap/grid/guide/performance foundations; never redefines them."
version: 0.1.0
publish_to: none
resolution: workspace

environment:
  sdk: ^3.12.0

dependencies:
  core_geometry:
    path: ../core_geometry
  core_interaction:
    path: ../core_interaction
  core_performance:
    path: ../core_performance
  core_textile:
    path: ../core_textile
  core_tooling:
    path: ../core_tooling
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  meta: ^1.16.0

dev_dependencies:
  build_runner: ^2.15.0
  freezed: ^3.2.3
  json_serializable: ^6.11.1
  test: ^1.25.0

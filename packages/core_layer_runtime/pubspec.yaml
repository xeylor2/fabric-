name: core_layer_runtime
description: "FEBRIC Layer Runtime (Scope B): the runtime orchestration layer that holds the active layer reference, exposes the frozen LayerModel traversal, emits existing frozen document commands (create/delete/move/rename/setLayerMetadata) and forwards them to the document runtime (DocumentEngine.apply). Never mutates LayerModel, never reduces commands itself, never replaces the document reducer. Introduces zero new layer semantics — pure composition of the frozen core_layer and core_document contracts."
version: 0.1.0
publish_to: none
resolution: workspace

environment:
  sdk: ^3.12.0

dependencies:
  core_document:
    path: ../core_document
  core_layer:
    path: ../core_layer
  meta: ^1.16.0

dev_dependencies:
  test: ^1.25.0
